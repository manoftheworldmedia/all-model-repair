media:
  input: img
  output: img

content:
  - name: site_content
    label: Site Content
    type: file
    path: content.json
    fields:
      - { name: phone, label: Phone (display), type: string }
      - { name: smsPhone, label: Text/SMS number, type: string }
      - name: address
        label: Address
        type: object
        fields:
          - name: street
            label: Street
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: cityLine
            label: City line
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - { name: mapQuery, label: Google Maps search query (English), type: string }
      - name: hero
        label: Hero
        type: object
        fields:
          - name: eyebrow
            label: Eyebrow (small label)
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: headlinePre
            label: Headline — before accent
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: headlineAccent
            label: Headline — accent (orange) words
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: headlinePost
            label: Headline — after accent
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: lead
            label: Intro paragraph
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }
      - name: services
        label: Services
        type: object
        list: true
        fields:
          - name: icon
            label: Icon
            type: select
            options:
              values: [general, brakes, engine, transmission, electrical, smog, ac, body, tuneup, detailing]
          - name: title
            label: Title
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: text
            label: Description
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }
      - name: about
        label: About
        type: object
        fields:
          - name: eyebrow
            label: Eyebrow
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: heading
            label: Heading
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: lead
            label: Lead paragraph
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }
          - name: body
            label: Body paragraph
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }
      - name: hours
        label: Hours
        type: object
        list: true
        fields:
          - name: day
            label: Day
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: hours
            label: Hours (e.g. 8:30 AM – 5:00 PM, or Closed)
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }

  - name: faq
    label: FAQ
    type: file
    path: faq.json
    fields:
      - name: items
        label: Questions & Answers
        type: object
        list: true
        fields:
          - name: category
            label: Category
            type: select
            options:
              values: [general, repairs, detailing, trust]
          - name: question
            label: Question
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: answer
            label: Answer
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }

  - name: blog
    label: Blog Posts
    type: file
    path: blog/posts.json
    fields:
      - name: posts
        label: Posts
        type: object
        list: true
        fields:
          - { name: slug, label: "URL slug (lowercase-with-dashes, no spaces)", type: string, pattern: "^[a-z0-9-]+$" }
          - { name: date, label: Date, type: date, options: { format: yyyy-MM-dd } }
          - { name: home, label: "Show on home page", type: boolean, default: false }
          - { name: cover, label: Cover image, type: image }
          - name: category
            label: Category
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: title
            label: Title
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: metaTitle
            label: "SEO meta title (optional — overrides browser tab & Google title; leave blank to use Title)"
            type: object
            fields:
              - { name: en, label: English, type: string }
              - { name: fa, label: Farsi / فارسی, type: string }
          - name: description
            label: Short description (cards & SEO)
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }
          - name: metaDescription
            label: "SEO meta description (optional — overrides the Google snippet; leave blank to use Short description)"
            type: object
            fields:
              - { name: en, label: English, type: text }
              - { name: fa, label: Farsi / فارسی, type: text }
          - name: body
            label: Article body
            type: object
            fields:
              - { name: en, label: English, type: rich-text }
              - { name: fa, label: Farsi / فارسی, type: rich-text }
